<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Agency CRM — Contacts · Pipeline · Deals · Activities</title>
<style>
  :root{
    --bg:#0f1419; --panel:#171d26; --panel2:#1d2530; --line:#2a323f;
    --txt:#e6edf3; --muted:#8b97a7; --accent:#4f7cff; --accent2:#6c5ce7;
    --green:#2ecc71; --red:#ff5c5c; --amber:#f5a623; --chip:#222b38;
    --radius:12px;
  }
  *{box-sizing:border-box}
  body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:var(--bg);color:var(--txt);font-size:14px}
  a{color:var(--accent)}
  .app{display:flex;min-height:100vh}
  .side{width:220px;background:var(--panel);border-right:1px solid var(--line);padding:18px 12px;position:sticky;top:0;height:100vh;display:flex;flex-direction:column;gap:4px}
  .brand{font-weight:700;font-size:17px;padding:6px 10px 14px;letter-spacing:.3px}
  .brand small{display:block;color:var(--muted);font-weight:500;font-size:11px;margin-top:3px}
  .nav{display:block;padding:10px 12px;border-radius:9px;color:var(--muted);cursor:pointer;text-decoration:none;font-weight:600}
  .nav:hover{background:var(--panel2);color:var(--txt)}
  .nav.active{background:var(--accent);color:#fff}
  .nav .c{float:right;background:rgba(255,255,255,.15);border-radius:20px;padding:0 8px;font-size:11px;font-weight:700}
  .side .foot{margin-top:auto;display:flex;flex-direction:column;gap:6px}
  .btn{background:var(--accent);color:#fff;border:0;padding:9px 14px;border-radius:9px;cursor:pointer;font-weight:600;font-size:13px}
  .btn.sec{background:var(--panel2);border:1px solid var(--line);color:var(--txt)}
  .btn.sm{padding:5px 10px;font-size:12px}
  .btn.danger{background:var(--red)}
  .main{flex:1;padding:26px 32px;max-width:1600px}
  h1{font-size:24px;margin:0 0 4px}
  .sub{color:var(--muted);margin:0 0 22px}
  .grid{display:grid;gap:16px}
  .cards{grid-template-columns:repeat(auto-fit,minmax(210px,1fr))}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px}
  .card h3{margin:0 0 6px;font-size:13px;color:var(--muted);font-weight:600;text-transform:uppercase;letter-spacing:.5px}
  .card .big{font-size:28px;font-weight:700}
  .card .meta{color:var(--muted);font-size:12px;margin-top:6px}
  .row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .between{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:12px;flex-wrap:wrap}
  table{width:100%;border-collapse:collapse;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:hidden}
  th,td{text-align:left;padding:11px 12px;border-bottom:1px solid var(--line);vertical-align:middle}
  th{color:var(--muted);font-size:11px;text-transform:uppercase;letter-spacing:.5px;background:var(--panel2)}
  tr:last-child td{border-bottom:0}
  td.num,th.num{text-align:right;font-variant-numeric:tabular-nums}
  .pill{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700}
  .pill.green{background:rgba(46,204,113,.15);color:var(--green)}
  .pill.red{background:rgba(255,92,92,.15);color:var(--red)}
  .pill.amber{background:rgba(245,166,35,.15);color:var(--amber)}
  .pill.blue{background:rgba(79,124,255,.15);color:var(--accent)}
  .pill.violet{background:rgba(108,92,231,.18);color:#a99bf0}
  .pill.grey{background:var(--chip);color:var(--muted)}
  .muted{color:var(--muted)}
  .bar{height:7px;background:var(--panel2);border-radius:20px;overflow:hidden;min-width:90px}
  .bar > i{display:block;height:100%;background:var(--accent)}
  input,select,textarea{background:var(--panel2);border:1px solid var(--line);color:var(--txt);padding:9px 10px;border-radius:8px;font-size:13px;width:100%;font-family:inherit}
  input[type=checkbox]{width:auto}
  label{display:block;font-size:12px;color:var(--muted);margin:0 0 5px;font-weight:600}
  .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-start;justify-content:center;padding:60px 16px;overflow:auto;z-index:50}
  .modal-bg.show{display:flex}
  .modal{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:22px;width:600px;max-width:100%}
  .modal h2{margin:0 0 16px;font-size:18px}
  .fgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px}
  .fgrid .full{grid-column:1/3}
  .ms-row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
  .ms-row input[type=text]{flex:1}
  .tag{font-size:11px;background:var(--chip);color:var(--muted);padding:2px 8px;border-radius:6px;display:inline-block;margin:1px 2px}
  .empty{padding:40px;text-align:center;color:var(--muted)}
  .iconbtn{background:none;border:0;color:var(--muted);cursor:pointer;font-size:13px;padding:4px 6px}
  .iconbtn:hover{color:var(--txt)}
  .done-txt{text-decoration:line-through;color:var(--muted)}
  .seg{display:flex;gap:6px}
  .seg button{background:var(--panel2);border:1px solid var(--line);color:var(--muted);padding:6px 12px;border-radius:8px;cursor:pointer;font-size:12px;font-weight:600}
  .seg button.on{background:var(--accent);color:#fff;border-color:var(--accent)}
  .search{max-width:280px}
  /* kanban */
  .kanban{display:flex;gap:12px;overflow-x:auto;padding-bottom:8px}
  .col{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);min-width:240px;flex:1;display:flex;flex-direction:column}
  .col-h{padding:11px 13px;border-bottom:1px solid var(--line);font-weight:700;font-size:13px;display:flex;justify-content:space-between;align-items:center}
  .col-h .sum{color:var(--muted);font-size:11px;font-weight:600}
  .col-b{padding:10px;display:flex;flex-direction:column;gap:9px;min-height:60px;flex:1}
  .col-b.drag{outline:2px dashed var(--accent);outline-offset:-6px;border-radius:10px}
  .deal{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:11px;cursor:grab}
  .deal:active{cursor:grabbing}
  .deal .t{font-weight:700;font-size:13px;margin-bottom:4px}
  .deal .m{color:var(--muted);font-size:11px}
  .deal .v{font-weight:700;font-variant-numeric:tabular-nums;margin-top:6px}
  .feed{display:flex;flex-direction:column;gap:0}
  .fi{display:flex;gap:11px;padding:11px 0;border-bottom:1px solid var(--line)}
  .fi:last-child{border-bottom:0}
  .ico{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;background:var(--panel2)}
  .av{width:26px;height:26px;border-radius:50%;background:var(--accent2);color:#fff;display:inline-flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
  /* auth */
  .authwrap{position:fixed;inset:0;z-index:99999;background:var(--bg);display:flex;align-items:center;justify-content:center;padding:16px}
  .authcard{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:34px 32px;width:340px;max-width:100%;box-shadow:0 18px 50px rgba(0,0,0,.45)}
  .authcard h1{font-size:19px;margin:0 0 4px}
  .authcard p.sub{font-size:13px;margin:0 0 20px}
  .autherr{color:var(--red);font-size:13px;margin:0 0 12px;display:none}
</style>
</head>
<body>
<div class="app" id="app" style="display:none">
  <aside class="side">
    <div class="brand">Agency CRM<small>Contacts · Pipeline · Deals</small></div>
    <a class="nav" data-view="dashboard">Dashboard</a>
    <a class="nav" data-view="contacts">Contacts <span class="c" id="c-contacts"></span></a>
    <a class="nav" data-view="pipeline">Pipeline <span class="c" id="c-deals"></span></a>
    <a class="nav" data-view="activities">Activities <span class="c" id="c-acts"></span></a>
    <div class="foot">
      <button class="btn sec sm" onclick="exportData()">Export JSON</button>
      <div id="whoami" style="font-size:11px;color:var(--muted);margin-top:6px"></div>
      <button class="btn sec sm" onclick="signOut()">Sign out</button>
      <div id="syncstatus" style="margin-top:4px;font-size:11px;font-weight:600;color:#d97706">● Connecting…</div>
    </div>
  </aside>
  <main class="main" id="main"></main>
</div>

<div class="modal-bg" id="modal-bg"><div class="modal" id="modal"></div></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.108.2/dist/umd/supabase.js" integrity="sha384-nD3dwv4+ZqdYnmZKe/249ImlV04om7xTCcsoSeQYI+RO+XlKPoqAWaJR1M5SJH9p" crossorigin="anonymous"></script>
<script>
/* ================= SHARED BACKEND (Supabase) =================
   CRM Frontend (OMN-58) bound to the canonical CRM backend (OMN-59) on the
   Convergence project, schema `public`. Access is gated by **Supabase Auth**
   (email/password) — the publishable/anon key alone returns nothing because
   RLS grants CRUD only to the `authenticated` role. This replaces the previous
   SHA-256 access-code gate + anon-exposed crm56_* prototype tables.

   Canonical tables:
     contacts (polymorphic: kind in 'company'|'person', self-FK company_id)
     pipelines, pipeline_stages (configurable, ordered)
     deals (stage_id FK; weighted_value is a generated column; trigger inherits
            stage default probability and syncs status/closed_at on won/lost)
     activities, notes

   Writes are per-row (insert/update/delete) and re-select the row so generated
   columns (weighted_value) and trigger-set fields (status/probability) round-trip. */
const SB_URL = "https://krthbgtykwamxqvapxnx.supabase.co";
const SB_KEY = "sb_publishable_ToA4drk8mWPKiG6RsxRGyA_GC7iXSqf"; // publishable (anon) key — identifies the project only; RLS requires an authenticated session
const T = { contacts:"contacts", deals:"deals", activities:"activities", pipelines:"pipelines", stages:"pipeline_stages" };
let sb = null;
try { sb = window.supabase.createClient(SB_URL, SB_KEY, { auth:{ persistSession:true, autoRefreshToken:true, detectSessionInUrl:false } }); } catch(e){ sb = null; }

/* in-memory store (camelCase). companies/people are both rows of `contacts`. */
let DB = { companies:[], people:[], deals:[], activities:[] };
let STAGES = [];            // [{id,key,label,position,isWon,isLost,defProb,cls}]
let PIPELINE_ID = null;     // default pipeline id (deals.pipeline_id is NOT NULL)
let VIEW = "dashboard";
let SESSION_EMAIL = "";

const ACT_ICON = {call:"📞", email:"✉️", meeting:"🗓️", note:"📝", task:"✅", other:"•"};
const STAGE_CLS_BY_POS = ["grey","blue","violet","amber","green","red"];

/* ---------- mappers (canonical row <-> in-memory object) ---------- */
function companyToObj(r){ return {id:r.id,name:r.name,domain:r.website||"",address:r.address||"",tags:r.tags||[]}; }
function companyToRow(o){ return {kind:"company",name:o.name,website:o.domain||null,address:o.address||null,tags:o.tags||[],company_id:null}; }
function personToObj(r){ return {id:r.id,name:r.name,email:r.email||"",phone:r.phone||"",title:r.title||"",companyId:r.company_id||"",tags:r.tags||[]}; }
function personToRow(o){ return {kind:"person",name:o.name,email:o.email||null,phone:o.phone||null,title:o.title||null,company_id:o.companyId||null,tags:o.tags||[]}; }
function dealToObj(r){ return {id:r.id,title:r.name,contactId:r.contact_id||"",stageId:r.stage_id||"",value:+r.value||0,probability:Math.round((+r.probability||0)*100),weighted:+r.weighted_value||0,status:r.status,closeDate:r.expected_close_date||""}; }
function dealToRow(o){ return {name:o.title,pipeline_id:PIPELINE_ID,stage_id:o.stageId||null,contact_id:o.contactId||null,value:+o.value||0,probability:(+o.probability||0)/100,expected_close_date:o.closeDate||null}; }
function actToObj(r){ return {id:r.id,type:r.type,subject:r.subject||"",notes:r.notes||"",contactId:r.contact_id||"",dealId:r.deal_id||"",date:(r.activity_date||"").slice(0,10)}; }
function actToRow(o){ return {type:o.type,subject:o.subject||null,notes:o.notes||null,contact_id:o.contactId||null,deal_id:o.dealId||null,activity_date:o.date?o.date:new Date().toISOString()}; }

/* ---------- low-level row ops ---------- */
async function rowInsert(table,row){ const {data,error}=await sb.from(table).insert(row).select().single(); if(error) throw error; return data; }
async function rowUpdate(table,id,row){ const {data,error}=await sb.from(table).update(row).eq("id",id).select().single(); if(error) throw error; return data; }
async function rowDelete(table,id){ const {error}=await sb.from(table).delete().eq("id",id); if(error) throw error; }

function setStatus(txt, ok){ const el=document.getElementById("syncstatus"); if(el){ el.textContent=txt; el.style.color = ok?"#16a34a":"#d97706"; } }

/* ---------- load everything for the signed-in session ---------- */
async function loadAll(){
  const [pl, st, ct, dl, ac] = await Promise.all([
    sb.from(T.pipelines).select("*").order("is_default",{ascending:false}),
    sb.from(T.stages).select("*").order("position",{ascending:true}),
    sb.from(T.contacts).select("*").order("created_at",{ascending:true}),
    sb.from(T.deals).select("*").order("value",{ascending:false}),
    sb.from(T.activities).select("*").order("activity_date",{ascending:false})
  ]);
  for(const r of [pl,st,ct,dl,ac]) if(r.error) throw r.error;
  const pipelines = pl.data||[];
  const def = pipelines.find(p=>p.is_default) || pipelines[0];
  PIPELINE_ID = def ? def.id : null;
  STAGES = (st.data||[]).filter(s=>!PIPELINE_ID||s.pipeline_id===PIPELINE_ID)
    .sort((a,b)=>a.position-b.position)
    .map((s,i)=>({id:s.id,key:s.id,label:s.name,position:s.position,isWon:s.is_won,isLost:s.is_lost,defProb:+s.default_probability,
      cls: s.is_won?"green": s.is_lost?"red": (STAGE_CLS_BY_POS[i]||"grey")}));
  const contacts = ct.data||[];
  DB.companies = contacts.filter(r=>r.kind==="company").map(companyToObj);
  DB.people    = contacts.filter(r=>r.kind==="person").map(personToObj);
  DB.deals     = (dl.data||[]).map(dealToObj);
  DB.activities= (ac.data||[]).map(actToObj);
}

async function init(){
  setStatus("● Connecting…", true);
  try{
    await loadAll();
    setStatus("● Live · shared", true);
    document.getElementById("whoami").textContent = "Signed in: "+SESSION_EMAIL;
  }catch(e){
    setStatus("● Load failed", false); console.error("CRM load failed:", e);
    alert("Could not load CRM data: "+(e.message||e));
  }
  renderCounts(); go("dashboard");
}

/* ---------- helpers ---------- */
function esc(s){ return (s==null?"":String(s)).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }
function money(n){ n=+n||0; return "$"+n.toLocaleString("en-US"); }
function moneyK(n){ n=+n||0; return n>=1000 ? "$"+Math.round(n/1000)+"k" : "$"+n; }
function company(id){ return DB.companies.find(c=>c.id===id); }
function person(id){ return DB.people.find(p=>p.id===id); }
function contactAny(id){ return person(id)||company(id); }
function deal(id){ return DB.deals.find(d=>d.id===id); }
function companyName(id){ const c=company(id); return c?c.name:"—"; }
function personName(id){ const p=person(id); return p?p.name:"—"; }
function contactLabel(id){ const p=person(id); if(p) return p.name+(p.companyId?(" · "+companyName(p.companyId)):""); const c=company(id); return c?c.name:"—"; }
function dealName(id){ const d=deal(id); return d?d.title:"—"; }
function stageMeta(id){ return STAGES.find(s=>s.id===id)||STAGES[0]||{id:"",label:"—",cls:"grey",isWon:false,isLost:false}; }
function stagePill(id){ const s=stageMeta(id); return `<span class="pill ${s.cls}">${esc(s.label)}</span>`; }
function isOpen(d){ return d.status!=="won"&&d.status!=="lost"; }
function initials(n){ return (n||"?").split(/\s+/).slice(0,2).map(w=>w[0]||"").join("").toUpperCase(); }
function companyOptions(val){ return `<option value="">— none —</option>`+DB.companies.map(c=>`<option value="${c.id}" ${c.id===val?"selected":""}>${esc(c.name)}</option>`).join(""); }
function contactOptions(val){ // people + companies, both valid deal/activity contacts
  const ppl=DB.people.map(p=>`<option value="${p.id}" ${p.id===val?"selected":""}>${esc(p.name)}${p.companyId?(" · "+esc(companyName(p.companyId))):""}</option>`).join("");
  const cos=DB.companies.map(c=>`<option value="${c.id}" ${c.id===val?"selected":""}>${esc(c.name)} (company)</option>`).join("");
  return `<option value="">— none —</option>`+ppl+cos;
}
function dealOptions(val){ return `<option value="">— none —</option>`+DB.deals.map(d=>`<option value="${d.id}" ${d.id===val?"selected":""}>${esc(d.title)}</option>`).join(""); }
function stageOptions(val){ return STAGES.map(s=>`<option value="${s.id}" ${s.id===val?"selected":""}>${esc(s.label)}</option>`).join(""); }
function tagsHtml(arr){ return (arr||[]).map(t=>`<span class="tag">${esc(t)}</span>`).join(""); }

function renderCounts(){
  document.getElementById("c-contacts").textContent=DB.people.length;
  document.getElementById("c-deals").textContent=DB.deals.filter(isOpen).length;
  document.getElementById("c-acts").textContent=DB.activities.length;
}

/* ---------- modal / nav ---------- */
function openModal(html){ const m=document.getElementById("modal"); m.innerHTML=html; document.getElementById("modal-bg").classList.add("show"); }
function closeModal(){ document.getElementById("modal-bg").classList.remove("show"); }
document.getElementById("modal-bg").addEventListener("click",e=>{ if(e.target.id==="modal-bg") closeModal(); });
function go(v){ VIEW=v; document.querySelectorAll(".nav").forEach(n=>n.classList.toggle("active",n.dataset.view===v)); render(); }
document.querySelectorAll(".nav").forEach(n=>n.addEventListener("click",()=>go(n.dataset.view)));

/* error helper: on a failed write, reload from cloud to stay consistent */
async function failAndReload(e){ console.error("CRM write failed:", e); alert("Save failed: "+(e.message||e)+"\nReloading latest data."); try{ await loadAll(); }catch(_){} renderCounts(); render(); }

/* ================= DASHBOARD ================= */
function viewDashboard(){
  const open=DB.deals.filter(isOpen);
  const won=DB.deals.filter(d=>d.status==="won");
  const openVal=open.reduce((s,d)=>s+(+d.value||0),0);
  const wonVal=won.reduce((s,d)=>s+(+d.value||0),0);
  const weighted=open.reduce((s,d)=>s+(+d.weighted||0),0);
  const byStage=STAGES.filter(s=>!s.isWon&&!s.isLost).map(s=>{
    const ds=DB.deals.filter(d=>d.stageId===s.id); const v=ds.reduce((a,d)=>a+(+d.value||0),0);
    return {s, n:ds.length, v};
  });
  const maxV=Math.max(...byStage.map(x=>x.v),1);
  const topOpen=[...open].sort((a,b)=>(+b.value||0)-(+a.value||0)).slice(0,6);
  const feed=[...DB.activities].sort((a,b)=>(b.date||"").localeCompare(a.date||"")).slice(0,8);
  return `
  <h1>Dashboard</h1>
  <p class="sub">Sales pipeline health — ${new Date().toISOString().slice(0,10)}</p>
  <div class="grid cards">
    <div class="card"><h3>Open pipeline</h3><div class="big">${moneyK(openVal)}</div><div class="meta">${open.length} open deals</div></div>
    <div class="card"><h3>Weighted forecast</h3><div class="big">${moneyK(weighted)}</div><div class="meta">value × probability</div></div>
    <div class="card"><h3>Won (total)</h3><div class="big">${moneyK(wonVal)}</div><div class="meta">${won.length} closed-won</div></div>
    <div class="card"><h3>Contacts</h3><div class="big">${DB.people.length}</div><div class="meta">${DB.companies.length} companies</div></div>
  </div>
  <div class="grid" style="grid-template-columns:1.3fr 1fr;margin-top:18px">
    <div>
      <div class="between"><h3 style="margin:0">Pipeline by stage</h3><a class="nav" style="display:inline;padding:4px 8px" onclick="go('pipeline')">Open pipeline →</a></div>
      <table><thead><tr><th>Stage</th><th class="num">Deals</th><th>Value</th></tr></thead><tbody>
      ${byStage.map(x=>`<tr><td>${stagePill(x.s.id)}</td><td class="num">${x.n}</td><td><div class="row"><div class="bar" style="flex:1"><i style="width:${x.v/maxV*100}%"></i></div><span class="num" style="min-width:54px">${moneyK(x.v)}</span></div></td></tr>`).join("")}
      </tbody></table>
      <div class="between" style="margin-top:20px"><h3 style="margin:0">Top open deals</h3></div>
      <table><thead><tr><th>Deal</th><th>Stage</th><th class="num">Value</th><th class="num">Weighted</th></tr></thead><tbody>
      ${topOpen.map(d=>`<tr><td><b>${esc(d.title)}</b><div class="muted" style="font-size:12px">${esc(contactLabel(d.contactId))}</div></td><td>${stagePill(d.stageId)}</td><td class="num">${moneyK(d.value)}</td><td class="num muted">${moneyK(d.weighted)}</td></tr>`).join("")||'<tr><td colspan=4 class=muted>No open deals</td></tr>'}
      </tbody></table>
    </div>
    <div>
      <div class="between"><h3 style="margin:0">Activity feed</h3><a class="nav" style="display:inline;padding:4px 8px" onclick="go('activities')">All →</a></div>
      <div class="card"><div class="feed">
      ${feed.map(a=>`<div class="fi"><div class="ico">${ACT_ICON[a.type]||"•"}</div><div style="flex:1"><div style="font-weight:600">${esc(a.subject)}</div><div class="muted" style="font-size:12px">${esc(a.date||"")}${a.contactId?(" · "+esc(contactLabel(a.contactId))):""}</div></div></div>`).join("")||'<div class="muted">No activity yet</div>'}
      </div></div>
    </div>
  </div>`;
}

/* ================= CONTACTS (people + companies) ================= */
let contactTab="people", contactQ="";
function viewContacts(){
  const seg=`<div class="seg">
    <button class="${contactTab==='people'?'on':''}" onclick="contactTab='people';render()">People</button>
    <button class="${contactTab==='companies'?'on':''}" onclick="contactTab='companies';render()">Companies</button></div>`;
  const search=`<input class="search" placeholder="Search…" value="${esc(contactQ)}" oninput="contactQ=this.value;render();const e=document.querySelector('.search');if(e){e.focus();e.setSelectionRange(e.value.length,e.value.length);}">`;
  if(contactTab==="people"){
    const q=contactQ.toLowerCase();
    const list=DB.people.filter(p=>!q||[p.name,p.email,p.title,companyName(p.companyId),(p.tags||[]).join(" ")].join(" ").toLowerCase().includes(q));
    const rows=list.map(p=>`<tr>
      <td><div class="row"><span class="av">${esc(initials(p.name))}</span><div><b>${esc(p.name)}</b><div class="muted" style="font-size:12px">${esc(p.title||"")}</div></div></div></td>
      <td>${esc(companyName(p.companyId))}</td>
      <td class="muted">${esc(p.email||"")}<div style="font-size:12px">${esc(p.phone||"")}</div></td>
      <td>${tagsHtml(p.tags)}</td>
      <td><button class="iconbtn" onclick="editPerson('${p.id}')">Edit</button><button class="iconbtn" onclick="delItem('people','${p.id}')">✕</button></td>
    </tr>`).join("");
    return `<div class="between"><div><h1>Contacts</h1><p class="sub" style="margin:0">People &amp; companies · tags</p></div>
      <div class="row">${search}${seg}<button class="btn" onclick="editPerson()">+ New Person</button></div></div>
      <table><thead><tr><th>Name</th><th>Company</th><th>Contact</th><th>Tags</th><th></th></tr></thead>
      <tbody>${rows||'<tr><td colspan=5 class=empty>No people yet — add one.</td></tr>'}</tbody></table>`;
  } else {
    const q=contactQ.toLowerCase();
    const list=DB.companies.filter(c=>!q||[c.name,c.domain,c.address,(c.tags||[]).join(" ")].join(" ").toLowerCase().includes(q));
    const rows=list.map(c=>{
      const ppl=DB.people.filter(p=>p.companyId===c.id).length;
      const dv=DB.deals.filter(d=>{const ct=d.contactId; const pc=person(ct); return ct===c.id||(pc&&pc.companyId===c.id);}).filter(d=>d.status!=="lost").reduce((s,d)=>s+(+d.value||0),0);
      return `<tr>
      <td><b>${esc(c.name)}</b><div class="muted" style="font-size:12px">${esc(c.domain||"")}</div></td>
      <td class="muted">${esc(c.address||"")}</td>
      <td class="num">${ppl}</td>
      <td class="num">${moneyK(dv)}</td>
      <td>${tagsHtml(c.tags)}</td>
      <td><button class="iconbtn" onclick="editCompany('${c.id}')">Edit</button><button class="iconbtn" onclick="delItem('companies','${c.id}')">✕</button></td>
    </tr>`;}).join("");
    return `<div class="between"><div><h1>Contacts</h1><p class="sub" style="margin:0">People &amp; companies · tags</p></div>
      <div class="row">${search}${seg}<button class="btn" onclick="editCompany()">+ New Company</button></div></div>
      <table><thead><tr><th>Company</th><th>Address</th><th class="num">People</th><th class="num">Pipeline</th><th>Tags</th><th></th></tr></thead>
      <tbody>${rows||'<tr><td colspan=6 class=empty>No companies yet — add one.</td></tr>'}</tbody></table>`;
  }
}
function editPerson(id){
  const p=id?person(id):{name:"",email:"",phone:"",title:"",companyId:"",tags:[]};
  openModal(`<h2>${id?"Edit":"New"} Person</h2><form onsubmit="savePerson(event,'${id||""}')">
    <div class="fgrid">
      <div><label>Name</label><input name="name" required value="${esc(p.name)}"></div>
      <div><label>Title</label><input name="title" value="${esc(p.title)}"></div>
      <div><label>Email</label><input name="email" type="email" value="${esc(p.email)}"></div>
      <div><label>Phone</label><input name="phone" value="${esc(p.phone)}"></div>
      <div><label>Company</label><select name="companyId">${companyOptions(p.companyId)}</select></div>
      <div class="full"><label>Tags (comma separated)</label><input name="tags" value="${esc((p.tags||[]).join(", "))}"></div>
    </div>
    <div class="row" style="justify-content:flex-end"><button type="button" class="btn sec" onclick="closeModal()">Cancel</button><button class="btn">Save</button></div>
  </form>`);
}
async function savePerson(e,id){ e.preventDefault(); const f=e.target;
  const tags=f.tags.value.split(",").map(s=>s.trim()).filter(Boolean);
  const obj={name:f.name.value,title:f.title.value,email:f.email.value,phone:f.phone.value,companyId:f.companyId.value,tags};
  closeModal();
  try{
    if(id){ const r=await rowUpdate(T.contacts,id,personToRow(obj)); Object.assign(person(id),personToObj(r)); }
    else { const r=await rowInsert(T.contacts,personToRow(obj)); DB.people.push(personToObj(r)); }
    renderCounts(); render();
  }catch(err){ failAndReload(err); }
}
function editCompany(id){
  const c=id?company(id):{name:"",domain:"",address:"",tags:[]};
  openModal(`<h2>${id?"Edit":"New"} Company</h2><form onsubmit="saveCompany(event,'${id||""}')">
    <div class="fgrid">
      <div><label>Name</label><input name="name" required value="${esc(c.name)}"></div>
      <div><label>Website</label><input name="domain" value="${esc(c.domain)}"></div>
      <div class="full"><label>Address</label><input name="address" value="${esc(c.address)}"></div>
      <div class="full"><label>Tags (comma separated)</label><input name="tags" value="${esc((c.tags||[]).join(", "))}"></div>
    </div>
    <div class="row" style="justify-content:flex-end"><button type="button" class="btn sec" onclick="closeModal()">Cancel</button><button class="btn">Save</button></div>
  </form>`);
}
async function saveCompany(e,id){ e.preventDefault(); const f=e.target;
  const tags=f.tags.value.split(",").map(s=>s.trim()).filter(Boolean);
  const obj={name:f.name.value,domain:f.domain.value,address:f.address.value,tags};
  closeModal();
  try{
    if(id){ const r=await rowUpdate(T.contacts,id,companyToRow(obj)); Object.assign(company(id),companyToObj(r)); }
    else { const r=await rowInsert(T.contacts,companyToRow(obj)); DB.companies.push(companyToObj(r)); }
    renderCounts(); render();
  }catch(err){ failAndReload(err); }
}

/* ================= PIPELINE / DEALS ================= */
let pipView="kanban";
function viewPipeline(){
  const seg=`<div class="seg">
    <button class="${pipView==='kanban'?'on':''}" onclick="pipView='kanban';render()">Kanban</button>
    <button class="${pipView==='list'?'on':''}" onclick="pipView='list';render()">List</button></div>`;
  const head=`<div class="between"><div><h1>Pipeline</h1><p class="sub" style="margin:0">Deals &amp; opportunities · drag cards to change stage</p></div>
    <div class="row">${seg}<button class="btn" onclick="editDeal()">+ New Deal</button></div></div>`;
  const ds=DB.deals;
  if(pipView==="kanban"){
    const cols=STAGES.map(s=>{
      const items=ds.filter(d=>d.stageId===s.id);
      const v=items.reduce((a,d)=>a+(+d.value||0),0);
      const cards=items.map(d=>`<div class="deal" draggable="true" ondragstart="dragDeal(event,'${d.id}')" onclick="editDeal('${d.id}')">
        <div class="t">${esc(d.title)}</div>
        <div class="m">${esc(contactLabel(d.contactId))}</div>
        <div class="row" style="justify-content:space-between;margin-top:6px"><span class="v">${moneyK(d.value)}</span><span class="tag">${d.probability||0}%</span></div>
        <div class="m" style="margin-top:5px">${esc(d.closeDate||"no date")}</div>
      </div>`).join("");
      return `<div class="col"><div class="col-h"><span>${esc(s.label)} <span class="muted">(${items.length})</span></span><span class="sum">${moneyK(v)}</span></div>
        <div class="col-b" ondragover="dragOver(event)" ondragleave="dragLeave(event)" ondrop="dropDeal(event,'${s.id}')">${cards||'<div class="muted" style="font-size:12px;padding:6px">—</div>'}</div></div>`;
    }).join("");
    return head+`<div class="kanban">${cols}</div>`;
  } else {
    const pos={}; STAGES.forEach(s=>pos[s.id]=s.position);
    const list=[...ds].sort((a,b)=>(pos[a.stageId]??0)-(pos[b.stageId]??0)||(+b.value||0)-(+a.value||0));
    const rows=list.map(d=>`<tr>
      <td><b>${esc(d.title)}</b><div class="muted" style="font-size:12px">${esc(contactLabel(d.contactId))}</div></td>
      <td>${stagePill(d.stageId)}</td>
      <td class="num">${money(d.value)}</td>
      <td class="num">${d.probability||0}%</td>
      <td class="num muted">${moneyK(d.weighted)}</td>
      <td class="muted">${esc(d.closeDate||"")}</td>
      <td><button class="iconbtn" onclick="editDeal('${d.id}')">Edit</button><button class="iconbtn" onclick="delItem('deals','${d.id}')">✕</button></td>
    </tr>`).join("");
    return head+`<table><thead><tr><th>Deal</th><th>Stage</th><th class="num">Value</th><th class="num">Prob.</th><th class="num">Weighted</th><th>Close</th><th></th></tr></thead>
      <tbody>${rows||'<tr><td colspan=7 class=empty>No deals yet — add one.</td></tr>'}</tbody></table>`;
  }
}
let _dragId=null;
function dragDeal(e,id){ _dragId=id; e.dataTransfer.effectAllowed="move"; }
function dragOver(e){ e.preventDefault(); e.currentTarget.classList.add("drag"); }
function dragLeave(e){ e.currentTarget.classList.remove("drag"); }
async function dropDeal(e,stageId){ e.preventDefault(); e.currentTarget.classList.remove("drag"); const id=_dragId; _dragId=null; if(!id) return; const d=deal(id); if(!d||d.stageId===stageId) return;
  const prev=d.stageId; d.stageId=stageId; render();
  try{ const r=await rowUpdate(T.deals,id,{stage_id:stageId}); Object.assign(d,dealToObj(r)); renderCounts(); render(); }
  catch(err){ d.stageId=prev; failAndReload(err); }
}
function editDeal(id){
  const firstOpen=(STAGES.find(s=>!s.isWon&&!s.isLost)||STAGES[0]||{}).id||"";
  const d=id?deal(id):{title:"",contactId:"",value:0,stageId:firstOpen,probability:"",closeDate:""};
  openModal(`<h2>${id?"Edit":"New"} Deal</h2><form onsubmit="saveDeal(event,'${id||""}')">
    <div class="fgrid">
      <div class="full"><label>Title</label><input name="title" required value="${esc(d.title)}"></div>
      <div class="full"><label>Contact (person or company)</label><select name="contactId">${contactOptions(d.contactId)}</select></div>
      <div><label>Value ($)</label><input name="value" type="number" min="0" step="any" value="${d.value||0}"></div>
      <div><label>Stage</label><select name="stageId">${stageOptions(d.stageId)}</select></div>
      <div><label>Probability (%) <span class="muted" style="font-weight:400">— blank = stage default</span></label><input name="probability" type="number" min="0" max="100" value="${d.probability===""||d.probability==null?"":d.probability}"></div>
      <div><label>Close date</label><input name="closeDate" type="date" value="${esc(d.closeDate)}"></div>
    </div>
    <div class="row" style="justify-content:space-between">
      <div>${id?`<button type="button" class="btn sec sm" onclick="logForDeal('${id}')">+ Log activity</button>`:""}</div>
      <div class="row"><button type="button" class="btn sec" onclick="closeModal()">Cancel</button><button class="btn">Save</button></div>
    </div>
  </form>`);
}
async function saveDeal(e,id){ e.preventDefault(); const f=e.target;
  const probRaw=f.probability.value.trim();
  const obj={title:f.title.value,contactId:f.contactId.value,value:+f.value.value||0,stageId:f.stageId.value,probability:probRaw===""?null:(+probRaw||0),closeDate:f.closeDate.value};
  const row=dealToRow(obj);
  if(probRaw==="") delete row.probability; // let stage-default trigger fill it
  closeModal();
  try{
    if(id){ const r=await rowUpdate(T.deals,id,row); Object.assign(deal(id),dealToObj(r)); }
    else { const r=await rowInsert(T.deals,row); DB.deals.push(dealToObj(r)); }
    renderCounts(); render();
  }catch(err){ failAndReload(err); }
}
function logForDeal(dealId){ const d=deal(dealId); closeModal(); editActivity(null,{dealId,contactId:d?d.contactId:""}); }

/* ================= ACTIVITIES ================= */
let actFilter="all";
function viewActivities(){
  const seg=`<div class="seg">
    ${["all","call","email","meeting","note"].map(k=>`<button class="${actFilter===k?'on':''}" onclick="actFilter='${k}';render()">${k[0].toUpperCase()+k.slice(1)}</button>`).join("")}</div>`;
  let list=[...DB.activities];
  if(actFilter!=="all") list=list.filter(a=>a.type===actFilter);
  list.sort((a,b)=>(b.date||"").localeCompare(a.date||""));
  const rows=list.map(a=>`<tr>
    <td><span class="tag">${ACT_ICON[a.type]||""} ${esc(a.type)}</span></td>
    <td><b>${esc(a.subject)}</b>${a.notes?`<div class="muted" style="font-size:12px">${esc(a.notes)}</div>`:""}</td>
    <td class="muted">${a.contactId?esc(contactLabel(a.contactId)):""}${a.dealId?`<div style="font-size:12px">${esc(dealName(a.dealId))}</div>`:""}</td>
    <td class="muted">${esc(a.date||"")}</td>
    <td><button class="iconbtn" onclick="editActivity('${a.id}')">Edit</button><button class="iconbtn" onclick="delItem('activities','${a.id}')">✕</button></td>
  </tr>`).join("");
  return `<div class="between"><div><h1>Activities</h1><p class="sub" style="margin:0">Calls · emails · meetings · notes logged against contacts &amp; deals</p></div>
    <div class="row">${seg}<button class="btn" onclick="editActivity()">+ Log Activity</button></div></div>
    <table><thead><tr><th>Type</th><th>Subject</th><th>Linked to</th><th>Date</th><th></th></tr></thead>
    <tbody>${rows||'<tr><td colspan=5 class=empty>No activities yet — log one.</td></tr>'}</tbody></table>`;
}
function editActivity(id,pre){
  const a=id?DB.activities.find(x=>x.id===id):Object.assign({type:"call",subject:"",notes:"",contactId:"",dealId:"",date:new Date().toISOString().slice(0,10)},pre||{});
  openModal(`<h2>${id?"Edit":"Log"} Activity</h2><form onsubmit="saveActivity(event,'${id||""}')">
    <div class="fgrid">
      <div><label>Type</label><select name="type">${["call","email","meeting","note","task"].map(t=>`<option value="${t}" ${t===a.type?"selected":""}>${ACT_ICON[t]||""} ${t}</option>`).join("")}</select></div>
      <div><label>Date</label><input name="date" type="date" value="${esc(a.date)}"></div>
      <div class="full"><label>Subject</label><input name="subject" required value="${esc(a.subject)}"></div>
      <div><label>Contact</label><select name="contactId">${contactOptions(a.contactId)}</select></div>
      <div><label>Deal</label><select name="dealId">${dealOptions(a.dealId)}</select></div>
      <div class="full"><label>Notes</label><textarea name="notes" rows="3">${esc(a.notes)}</textarea></div>
    </div>
    <div class="row" style="justify-content:flex-end"><button type="button" class="btn sec" onclick="closeModal()">Cancel</button><button class="btn">Save</button></div>
  </form>`);
}
async function saveActivity(e,id){ e.preventDefault(); const f=e.target;
  const obj={type:f.type.value,subject:f.subject.value,notes:f.notes.value,contactId:f.contactId.value,dealId:f.dealId.value,date:f.date.value};
  if(!obj.contactId && !obj.dealId){ alert("Link the activity to a contact or a deal."); return; }
  closeModal();
  try{
    if(id){ const r=await rowUpdate(T.activities,id,actToRow(obj)); Object.assign(DB.activities.find(x=>x.id===id),actToObj(r)); }
    else { const r=await rowInsert(T.activities,actToRow(obj)); DB.activities.push(actToObj(r)); }
    renderCounts(); render();
  }catch(err){ failAndReload(err); }
}

/* ---------- shared ---------- */
const COLL_TABLE={companies:T.contacts,people:T.contacts,deals:T.deals,activities:T.activities};
async function delItem(coll,id){ if(!confirm("Delete this item?")) return;
  try{ await rowDelete(COLL_TABLE[coll],id); DB[coll]=DB[coll].filter(x=>x.id!==id);
    if(coll==="companies"||coll==="people"||coll==="deals"){ try{ await loadAll(); }catch(_){} } // refresh cascades/links
    renderCounts(); render();
  }catch(err){ failAndReload(err); }
}
function exportData(){ const b=new Blob([JSON.stringify(DB,null,2)],{type:"application/json"}); const a=document.createElement("a"); a.href=URL.createObjectURL(b); a.download="agency-crm-data.json"; a.click(); }

/* ---------- render ---------- */
function render(){
  const m=document.getElementById("main");
  m.innerHTML = VIEW==="dashboard"?viewDashboard(): VIEW==="contacts"?viewContacts(): VIEW==="pipeline"?viewPipeline(): viewActivities();
}

/* ================= AUTH (Supabase email/password) ================= */
function showLogin(msg){
  document.getElementById("app").style.display="none";
  let o=document.getElementById("authwrap");
  if(!o){ o=document.createElement("div"); o.id="authwrap"; o.className="authwrap"; document.body.appendChild(o); }
  o.innerHTML=`<form class="authcard" id="loginForm">
    <h1>Agency CRM</h1>
    <p class="sub">Contacts · Pipeline · Deals — board sign-in</p>
    <p class="autherr" id="authErr" style="${msg?"display:block":""}">${esc(msg||"")}</p>
    <label>Email</label>
    <input id="authEmail" type="email" autocomplete="username" autofocus placeholder="you@company.com">
    <label style="margin-top:12px">Password</label>
    <input id="authPass" type="password" autocomplete="current-password" placeholder="••••••••">
    <button type="submit" class="btn" style="width:100%;margin-top:18px;padding:11px">Sign in</button>
    <p style="color:#5b6573;font-size:11px;text-align:center;margin:18px 0 0">Authenticated access · Supabase Auth · RLS-protected</p>
  </form>`;
  document.getElementById("loginForm").addEventListener("submit",async(e)=>{
    e.preventDefault();
    const email=document.getElementById("authEmail").value.trim();
    const password=document.getElementById("authPass").value;
    const btn=e.target.querySelector("button[type=submit]"); btn.disabled=true; btn.textContent="Signing in…";
    const { data, error } = await sb.auth.signInWithPassword({ email, password });
    if(error){ const el=document.getElementById("authErr"); el.textContent=error.message||"Sign-in failed."; el.style.display="block"; btn.disabled=false; btn.textContent="Sign in"; return; }
    SESSION_EMAIL = (data&&data.user&&data.user.email)||email;
    o.remove();
    document.getElementById("app").style.display="flex";
    init();
  });
}
async function signOut(){ try{ await sb.auth.signOut(); }catch(e){} location.reload(); }

async function boot(){
  if(!sb){ showLogin("Supabase client failed to load. Check your connection and reload."); return; }
  const { data } = await sb.auth.getSession();
  if(data && data.session){
    SESSION_EMAIL = data.session.user.email||"";
    document.getElementById("app").style.display="flex";
    init();
  } else {
    showLogin("");
  }
}
boot();
</script>
